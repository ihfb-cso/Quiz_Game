<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상식 퀴즈 게임</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, "Noto Sans KR", sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px 16px;
    }

    .container {
      width: 100%;
      max-width: 640px;
    }

    /* ── 시작 화면 ── */
    #screen-start { text-align: center; }

    .start-title {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .start-subtitle {
      color: #555;
      margin-bottom: 24px;
    }

    .rules-box {
      background: #fff;
      border-radius: 12px;
      padding: 20px 24px;
      text-align: left;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .rules-box h2 {
      font-size: 1.1rem;
      margin-bottom: 12px;
    }

    .rules-box ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .rules-box li::before {
      content: "- ";
      color: #888;
    }

    .nickname-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .nickname-area input {
      width: 100%;
      max-width: 320px;
      padding: 12px 16px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }

    .nickname-area input:focus {
      border-color: #4361ee;
    }

    .nickname-warn {
      color: #d32f2f;
      font-size: 0.85rem;
      min-height: 1.2em;
    }

    .btn {
      display: inline-block;
      padding: 14px 40px;
      border: none;
      border-radius: 10px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: #4361ee;
      color: #fff;
    }

    .btn-primary:hover { background: #3a56d4; }

    .btn-primary:disabled {
      background: #aab;
      cursor: not-allowed;
    }

    /* ── 문제 화면 ── */
    #screen-quiz { display: none; }

    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 700;
      color: #fff;
    }

    .badge-한국사 { background: #e63946; }
    .badge-과학 { background: #457b9d; }
    .badge-지리 { background: #2a9d8f; }
    .badge-일반상식 { background: #e9c46a; color: #333; }

    .progress-text {
      font-size: 0.9rem;
      color: #666;
      font-weight: 600;
    }

    .progress-bar-track {
      width: 100%;
      height: 8px;
      background: #ddd;
      border-radius: 4px;
      margin-bottom: 24px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: #4361ee;
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    .quiz-card {
      background: #fff;
      border-radius: 14px;
      padding: 28px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    .quiz-question {
      font-size: 1.15rem;
      font-weight: 700;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .quiz-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option-btn {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid #ddd;
      border-radius: 10px;
      background: #fff;
      font-size: 1rem;
      text-align: left;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .option-btn:hover:not(:disabled) {
      border-color: #4361ee;
      background: #f0f4ff;
    }

    .option-num {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #eee;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 700;
      color: #555;
    }

    .option-btn.correct {
      border-color: #2e7d32;
      background: #e8f5e9;
    }

    .option-btn.correct .option-num {
      background: #2e7d32;
      color: #fff;
    }

    .option-btn.correct::after {
      content: "O 정답";
      margin-left: auto;
      font-weight: 700;
      color: #2e7d32;
      font-size: 0.85rem;
    }

    .option-btn.wrong {
      border-color: #c62828;
      background: #ffebee;
    }

    .option-btn.wrong .option-num {
      background: #c62828;
      color: #fff;
    }

    .option-btn.wrong::after {
      content: "X 오답";
      margin-left: auto;
      font-weight: 700;
      color: #c62828;
      font-size: 0.85rem;
    }

    .explanation {
      display: none;
      margin-top: 16px;
      padding: 14px 18px;
      background: #f8f9fa;
      border-left: 4px solid #4361ee;
      border-radius: 0 8px 8px 0;
      font-size: 0.95rem;
      line-height: 1.5;
      color: #333;
    }

    .btn-next-area {
      text-align: center;
      margin-top: 20px;
      display: none;
    }

    /* ── 결과 화면 ── */
    #screen-result {
      display: none;
      text-align: center;
    }

    .result-card {
      background: #fff;
      border-radius: 14px;
      padding: 32px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      margin-bottom: 20px;
    }

    .result-nickname {
      font-size: 1.1rem;
      color: #555;
      margin-bottom: 4px;
    }

    .result-title {
      font-size: 1.4rem;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .result-score {
      font-size: 2.8rem;
      font-weight: 800;
      color: #4361ee;
      margin: 8px 0;
    }

    .result-sub {
      color: #777;
      margin-bottom: 20px;
    }

    .result-detail {
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: #f8f9fa;
      border-radius: 8px;
    }

    .detail-row .badge { font-size: 0.8rem; }

    .detail-score { font-weight: 700; }

    /* ── 순위표 ── */
    .ranking-section {
      background: #fff;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      margin-bottom: 20px;
      text-align: left;
    }

    .ranking-title {
      font-size: 1.15rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 16px;
    }

    .ranking-table {
      width: 100%;
      border-collapse: collapse;
    }

    .ranking-table th {
      padding: 8px 6px;
      font-size: 0.8rem;
      color: #888;
      font-weight: 600;
      text-align: left;
      border-bottom: 2px solid #eee;
    }

    .ranking-table th:first-child { text-align: center; width: 40px; }
    .ranking-table th:last-child { text-align: right; }

    .ranking-table td {
      padding: 10px 6px;
      font-size: 0.95rem;
      border-bottom: 1px solid #f0f0f0;
    }

    .ranking-table td:first-child {
      text-align: center;
      font-weight: 800;
      color: #aaa;
    }

    .ranking-table td:last-child {
      text-align: right;
      font-size: 0.8rem;
      color: #999;
    }

    .ranking-table tr.rank-1 td:first-child { color: #ffd700; }
    .ranking-table tr.rank-2 td:first-child { color: #c0c0c0; }
    .ranking-table tr.rank-3 td:first-child { color: #cd7f32; }

    .ranking-table tr.current-record {
      background: #eef2ff;
    }

    .ranking-table tr.current-record td {
      font-weight: 700;
      color: #4361ee;
    }

    .ranking-table tr.current-record td:last-child {
      color: #4361ee;
    }

    .ranking-current-tag {
      display: inline-block;
      background: #4361ee;
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 4px;
      margin-left: 4px;
      vertical-align: middle;
    }

    .ranking-empty {
      text-align: center;
      color: #aaa;
      padding: 20px 0;
    }

    .score-cell {
      font-weight: 700;
    }

    /* ── 반응형 ── */
    @media (max-width: 480px) {
      body { padding: 16px 10px; }
      .start-title { font-size: 1.5rem; }
      .quiz-card { padding: 20px 16px; }
      .quiz-question { font-size: 1.05rem; }
      .result-score { font-size: 2.2rem; }
      .ranking-section { padding: 16px; }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- 시작 화면 -->
  <div id="screen-start">
    <h1 class="start-title">상식 퀴즈 게임</h1>
    <p class="start-subtitle">한국사 / 과학 / 지리 / 일반상식</p>

    <div class="rules-box">
      <h2>게임 규칙</h2>
      <ul>
        <li>총 40문제 (카테고리별 10문제)</li>
        <li>4개 보기 중 정답 1개를 선택하세요</li>
        <li>정답당 10점, 만점은 400점</li>
        <li>선택 후 변경은 불가합니다</li>
        <li>해설을 확인한 후 다음 문제로 넘어갑니다</li>
      </ul>
    </div>

    <div class="nickname-area">
      <input type="text" id="input-nickname" placeholder="닉네임을 입력하세요" maxlength="12">
      <p class="nickname-warn" id="nickname-warn"></p>
      <button class="btn btn-primary" id="btn-start" disabled>게임 시작</button>
    </div>
  </div>

  <!-- 문제 화면 -->
  <div id="screen-quiz">
    <div class="quiz-header">
      <span class="badge" id="quiz-category"></span>
      <span class="progress-text" id="quiz-progress"></span>
    </div>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progress-bar"></div>
    </div>
    <div class="quiz-card">
      <p class="quiz-question" id="quiz-question"></p>
      <div class="quiz-options" id="quiz-options"></div>
      <div class="explanation" id="quiz-explanation"></div>
    </div>
    <div class="btn-next-area" id="btn-next-area">
      <button class="btn btn-primary" id="btn-next">다음 문제</button>
    </div>
  </div>

  <!-- 결과 화면 -->
  <div id="screen-result">
    <div class="result-card">
      <p class="result-nickname" id="result-nickname"></p>
      <h1 class="result-title">최종 결과</h1>
      <p class="result-score" id="result-score"></p>
      <p class="result-sub" id="result-sub"></p>
      <div class="result-detail" id="result-detail"></div>
    </div>

    <div class="ranking-section">
      <p class="ranking-title">TOP 10 순위표</p>
      <div id="ranking-body"></div>
    </div>

    <button class="btn btn-primary" id="btn-restart">다시 하기</button>
  </div>

</div>

<script>
// ============================================================
// 문제 데이터
// ============================================================
const QUESTIONS = [
  // ── 한국사 (10문제) ──
  {
    id: 1,

    question: "조선을 건국한 인물은 누구인가?",

    explanation: "이성계는 1392년 조선을 건국하고 태조로 즉위했다."

  {

// ============================================================
// 게임 상태 객체
// ============================================================
const state = {
  nickname: "",
  currentIndex: 0,
  locked: false,
  score: 0,
  categoryCorrect: {
    "한국사": 0,
    "과학": 0,
    "지리": 0,
    "일반상식": 0
  },
  shuffled: [],
  currentRecordDate: null
};

// ============================================================
// 유틸
// ============================================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ============================================================
// 순위 기록 (localStorage)
// ============================================================
const RANKING_KEY = "quizRankings";

function loadRankings() {
  try {
    return JSON.parse(localStorage.getItem(RANKING_KEY)) || [];
  } catch {
    return [];
  }
}

function saveRanking(record) {
  const rankings = loadRankings();
  rankings.push(record);
  rankings.sort((a, b) => {
    if (b.score !== a.score) return b.score - a.score;
    return new Date(b.date) - new Date(a.date);
  });
  const top10 = rankings.slice(0, 10);
  localStorage.setItem(RANKING_KEY, JSON.stringify(top10));
  return top10;
}

function renderRanking(rankings, currentDate) {
  const $body = document.getElementById("ranking-body");

  if (rankings.length === 0) {
    $body.innerHTML = '<p class="ranking-empty">아직 기록이 없습니다.</p>';
    return;
  }

  let html = '<table class="ranking-table">';
  html += '<thead><tr><th>#</th><th>닉네임</th><th>점수</th><th>날짜</th></tr></thead>';
  html += '<tbody>';

  rankings.forEach((r, i) => {
    const isCurrent = r.date === currentDate;
    const rankClass = (i < 3 ? " rank-" + (i + 1) : "") + (isCurrent ? " current-record" : "");
    const tag = isCurrent ? '<span class="ranking-current-tag">NOW</span>' : "";
    const dateStr = r.date.slice(0, 10);

    html += '<tr class="' + rankClass.trim() + '">';
    html += "<td>" + (i + 1) + "</td>";
    html += "<td>" + escapeHtml(r.name) + tag + "</td>";
    html += '<td class="score-cell">' + r.score + "점</td>";
    html += "<td>" + dateStr + "</td>";
    html += "</tr>";
  });

  html += "</tbody></table>";
  $body.innerHTML = html;
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

// ============================================================
// 화면 전환
// ============================================================
const screens = {
  start: document.getElementById("screen-start"),
  quiz: document.getElementById("screen-quiz"),
  result: document.getElementById("screen-result")
};

function showScreen(name) {
  Object.values(screens).forEach(s => s.style.display = "none");
  screens[name].style.display = "block";
  window.scrollTo(0, 0);
}

// ============================================================
// DOM 참조
// ============================================================
const $nickname = document.getElementById("input-nickname");
const $nicknameWarn = document.getElementById("nickname-warn");
const $btnStart = document.getElementById("btn-start");
const $category = document.getElementById("quiz-category");
const $progress = document.getElementById("quiz-progress");
const $progressBar = document.getElementById("progress-bar");
const $question = document.getElementById("quiz-question");
const $options = document.getElementById("quiz-options");
const $explanation = document.getElementById("quiz-explanation");
const $btnNextArea = document.getElementById("btn-next-area");
const $btnNext = document.getElementById("btn-next");
const $btnRestart = document.getElementById("btn-restart");

// ============================================================
// 닉네임 입력
// ============================================================
$nickname.addEventListener("input", () => {
  const val = $nickname.value.trim();
  if (val.length > 0) {
    $btnStart.disabled = false;
    $nicknameWarn.textContent = "";
  } else {
    $btnStart.disabled = true;
  }
});

$nickname.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && $nickname.value.trim()) {
    $btnStart.click();
  }
});

// ============================================================
// 게임 시작
// ============================================================
$btnStart.addEventListener("click", () => {
  const val = $nickname.value.trim();
  if (!val) {
    $nicknameWarn.textContent = "닉네임을 입력해 주세요.";
    return;
  }
  state.nickname = val;
  state.currentIndex = 0;
  state.locked = false;
  state.score = 0;
  state.currentRecordDate = null;
  Object.keys(state.categoryCorrect).forEach(k => state.categoryCorrect[k] = 0);
  state.shuffled = shuffle(QUESTIONS);
  showScreen("quiz");
  renderQuestion();
});

// ============================================================
// 문제 렌더링
// ============================================================
function renderQuestion() {
  const q = state.shuffled[state.currentIndex];
  const total = state.shuffled.length;
  const num = state.currentIndex + 1;

  $category.textContent = q.category;
  $category.className = "badge badge-" + q.category;
  $progress.textContent = num + " / " + total;
  $progressBar.style.width = ((num / total) * 100) + "%";
  $question.textContent = "Q" + num + ". " + q.question;

  $options.innerHTML = "";
  const labels = ["A", "B", "C", "D"];
  q.options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.innerHTML = '<span class="option-num">' + labels[i] + '</span><span>' + escapeHtml(opt) + '</span>';
    btn.addEventListener("click", () => selectAnswer(i, btn));
    $options.appendChild(btn);
  });

  $explanation.style.display = "none";
  $explanation.textContent = "";
  $btnNextArea.style.display = "none";
  state.locked = false;
}

// ============================================================
// 답 선택
// ============================================================
function selectAnswer(index, btn) {
  if (state.locked) return;
  state.locked = true;

  const q = state.shuffled[state.currentIndex];
  const buttons = $options.querySelectorAll(".option-btn");
  const isCorrect = index === q.answer;

  buttons.forEach(b => b.disabled = true);

  if (isCorrect) {
    btn.classList.add("correct");
    state.score += 10;
    state.categoryCorrect[q.category]++;
  } else {
    btn.classList.add("wrong");
    buttons[q.answer].classList.add("correct");
  }

  $explanation.textContent = q.explanation;
  $explanation.style.display = "block";
  $btnNextArea.style.display = "block";

  if (state.currentIndex === state.shuffled.length - 1) {
    $btnNext.textContent = "결과 보기";
  } else {
    $btnNext.textContent = "다음 문제";
  }
}

// ============================================================
// 다음 문제 / 결과
// ============================================================
$btnNext.addEventListener("click", () => {
  state.currentIndex++;
  if (state.currentIndex >= state.shuffled.length) {
    showResult();
  } else {
    renderQuestion();
  }
});

// ============================================================
// 결과 화면
// ============================================================
function showResult() {
  showScreen("result");

  const correct = state.score / 10;

  document.getElementById("result-nickname").textContent = state.nickname + "님의 성적표";
  document.getElementById("result-score").textContent = state.score + " / 400";
  document.getElementById("result-sub").textContent = "40문제 중 " + correct + "문제 정답";

  const $detail = document.getElementById("result-detail");
  $detail.innerHTML = "";
  const categories = ["한국사", "과학", "지리", "일반상식"];
  categories.forEach(cat => {
    const cnt = state.categoryCorrect[cat];
    const row = document.createElement("div");
    row.className = "detail-row";
    row.innerHTML =
      '<span class="badge badge-' + cat + '">' + cat + '</span>' +
      '<span class="detail-score">' + cnt + ' / 10</span>';
    $detail.appendChild(row);
  });

  const now = new Date().toISOString();
  state.currentRecordDate = now;
  const record = {
    name: state.nickname,
    score: state.score,
    correct: correct,
    date: now
  };
  const rankings = saveRanking(record);
  renderRanking(rankings, now);
}

// ============================================================
// 다시 하기
// ============================================================
$btnRestart.addEventListener("click", () => {
  $nickname.value = "";
  $btnStart.disabled = true;
  showScreen("start");
});
</script>
